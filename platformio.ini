; PlatformIO Project Configuration File
; ESP32 DC Motor Controller with ACS712-30A Current Sensor
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM

; Upload settings
upload_speed = 921600

; Library dependencies
lib_deps =
    ; Async Web Server
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    ; ArduinoJson for REST API
    bblanchon/ArduinoJson @ ^7.0.4
    ; OLED SSD1306 support
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; LCD 1602 I2C support
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    ; EEPROM (built-in for ESP32)

; Filesystem for SPIFFS (web dashboard)
board_build.filesystem = spiffs

; Partition scheme with more space for SPIFFS
board_build.partitions = default.csv

; Extra scripts for SPIFFS upload
extra_scripts = 
    pre:tools/pre_build.py

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
upload_speed = 921600
lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    bblanchon/ArduinoJson @ ^7.0.4
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
board_build.filesystem = spiffs
